<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - API Test AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56, 189, 248, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 50%, rgba(34, 197, 94, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 0% 80%, rgba(168, 85, 247, 0.06), transparent);
            pointer-events: none;
        }
        .auth-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .auth-card {
            padding: 40px 36px 36px;
            border-radius: 24px;
            background: linear-gradient(165deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.98) 50%);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.03) inset,
                0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-brand .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #38bdf8, #22c55e, #eab308);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-brand .tagline {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }
        .auth-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin: 0 0 24px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(71, 85, 105, 0.8);
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        .btn-primary {
            width: 100%;
            margin-top: 8px;
            padding: 12px 0;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #38bdf8, #22c55e);
            color: #0f172a;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: translateY(0); }
        .auth-msg {
            margin-top: 16px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
        }
        .auth-msg.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .auth-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
        .auth-footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="logo">API TEST · AI</div>
            <div class="tagline">接口自动化测试与 AI 代码生成平台</div>
        </div>
        <h2>注册</h2>
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input id="password" name="password" type="password" autocomplete="new-password" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="请再次输入密码" required>
            </div>
            <button class="btn-primary" type="submit">注 册</button>
            <div class="auth-msg error" th:if="${error}" th:text="${error}">错误信息</div>
        </form>
        <div class="auth-footer">
            已有账号？<a th:href="@{/login}">返回登录</a>
        </div>
    </div>
</div>
</body>
</html>
