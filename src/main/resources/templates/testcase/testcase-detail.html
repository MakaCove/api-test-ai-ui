<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用例详情 - API Test AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body th:data-case-id="${case.id}" th:data-api-id="${case.apiId}" th:data-project-id="${case.projectId}">
<div class="app-layout">
    <th:block th:replace="~{layout :: sidebar('testcases')}"></th:block>
    <main class="main-area">
        <div class="container">
            <div class="breadcrumb">
                <a th:href="@{/}">工作台</a> &gt; <a th:href="@{/testcases}">用例列表</a> &gt; 用例详情
            </div>
            <div class="page-header">
                <h1>用例详情</h1>
                <p class="page-desc" th:text="${case.caseName}">-</p>
            </div>
            <div id="banner" class="banner"></div>
            <div class="card">
                <div class="detail-row"><span class="detail-label">用例名称</span><span class="detail-value" th:text="${case.caseName}">-</span></div>
                <div class="detail-row"><span class="detail-label">类型</span><span class="detail-value" th:text="${case.caseType}">-</span></div>
                <div class="detail-row"><span class="detail-label">描述</span><span class="detail-value" th:text="${case.description}">-</span></div>
                <div class="detail-row"><span class="detail-label">请求数据</span><span class="detail-value"><pre th:text="${case.requestData}">-</pre></span></div>
                <div class="detail-row"><span class="detail-label">预期响应</span><span class="detail-value"><pre th:text="${case.expectedResponse}">-</pre></span></div>
                <div class="detail-row"><span class="detail-label">校验规则</span><span class="detail-value"><pre th:text="${case.validationRules}">-</pre></span></div>
                <div class="detail-row"><span class="detail-label">优先级</span><span class="detail-value" th:text="${case.priority != null ? case.priority : 3}">-</span></div>
                <div class="detail-row"><span class="detail-label">状态</span><span class="detail-value" th:text="${statusDisplay != null and case.status != null and statusDisplay[case.status] != null ? statusDisplay[case.status] : (case.status != null ? case.status : '启用')}">-</span></div>
                <div class="detail-row"><span class="detail-label">代码状态</span><span class="detail-value" th:text="${codeGenStatusDisplay != null and case.codeGenStatus != null and codeGenStatusDisplay[case.codeGenStatus] != null ? codeGenStatusDisplay[case.codeGenStatus] : '未生成'}">-</span></div>
                <div class="detail-row"><span class="detail-label">所属项目</span><span class="detail-value" th:text="${projectName}">-</span></div>
                <div class="detail-row"><span class="detail-label">所属接口</span><span class="detail-value" th:text="${apiName}">-</span></div>
                <div class="detail-row"><span class="detail-label">创建时间</span><span class="detail-value" th:text="${case.createdAt != null ? #temporals.format(case.createdAt, 'yyyy-MM-dd HH:mm:ss') : '—'}">-</span></div>
                <div class="detail-row"><span class="detail-label">更新时间</span><span class="detail-value" th:text="${case.updatedAt != null ? #temporals.format(case.updatedAt, 'yyyy-MM-dd HH:mm:ss') : '—'}">-</span></div>
                <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-subtle);">
                    <a th:href="@{/testcases/{caseId}/code(caseId=${case.id})}" class="btn btn-secondary">代码</a>
                    <button type="button" class="btn btn-primary" id="btnGenCode" style="margin-left:8px;" th:disabled="${case.codeGenStatus == 'generating'}" th:text="${case.codeGenStatus == 'generating' ? '生成中' : 'AI生成测试用例自动化代码'}">AI生成测试用例自动化代码</button>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:inline="javascript">
    function getCaseId() { return document.body.getAttribute('data-case-id'); }
    function getApiId() { return document.body.getAttribute('data-api-id'); }
    function getProjectId() { return document.body.getAttribute('data-project-id'); }
    function showBanner(ok, msg) {
        const el = document.getElementById('banner');
        el.classList.remove('ok', 'err');
        el.classList.add(ok ? 'ok' : 'err');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 3000);
    }
    var btnGenCode = document.getElementById('btnGenCode');
    if (btnGenCode && !btnGenCode.disabled) {
        btnGenCode.addEventListener('click', async function() {
            if (this.disabled) return;
            var apiId = getApiId();
            var caseId = getCaseId();
            try {
                var resp = await fetch('/api/apis/' + apiId + '/testcodes/generate-case/' + caseId, { method: 'POST' });
                if (!resp.ok) {
                    var err = await resp.json().catch(function() { return {}; });
                    showBanner(false, err.message || '生成测试代码失败');
                    return;
                }
                var data = await resp.json();
                showBanner(true, data.message || '已开始生成，请刷新页面查看');
                this.disabled = true;
                this.textContent = '生成中';
            } catch (e) {
                showBanner(false, '生成测试代码异常，请查看控制台');
            }
        });
    }
</script>
</body>
</html>
