<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'测试用例 · ' + ${apiName}">测试用例</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <style>
        .breadcrumb { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }
        .breadcrumb a { color: #94a3b8; text-decoration: none; }
        .breadcrumb a:hover { color: #38bdf8; }
        h1 { font-size: 22px; margin: 0 0 18px; }
        .card { border-radius: 18px; padding: 18px 18px 20px; background: rgba(15, 23, 42, 0.96); border: 1px solid rgba(148, 163, 184, 0.4); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .btn-primary { border-radius: 999px; border: none; padding: 6px 14px; font-size: 13px; cursor: pointer; background: linear-gradient(120deg, #38bdf8, #22c55e); color: #0f172a; }
        .form-block { margin-bottom: 16px; display: none; flex-direction: column; gap: 8px; }
        .form-row { display: flex; gap: 8px; }
        input, select, textarea { border-radius: 10px; border: 1px solid rgba(55, 65, 81, 0.9); background: rgba(15, 23, 42, 0.9); color: #e5e7eb; font-size: 13px; padding: 7px 9px; }
        textarea { min-height: 80px; resize: vertical; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px 6px; border-bottom: 1px solid rgba(31, 41, 55, 0.9); }
        th { text-align: left; color: #9ca3af; font-weight: 500; }
        tr:hover td { background: rgba(15, 23, 42, 0.9); }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(148, 163, 184, 0.6); font-size: 11px; color: #9ca3af; }
        .empty { font-size: 13px; color: #9ca3af; padding-top: 4px; }
        .banner { margin-bottom: 10px; padding: 6px 10px; border-radius: 10px; font-size: 12px; display: none; }
        .banner.ok { background: rgba(22, 163, 74, 0.15); border: 1px solid rgba(34, 197, 94, 0.6); color: #bbf7d0; }
        .banner.err { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(248, 113, 113, 0.7); color: #fecaca; }
        .link-btn { color: #38bdf8; text-decoration: none; font-size: 12px; }
        .link-btn:hover { text-decoration: underline; }
    </style>
</head>
<body th:data-api-id="${apiId}" th:data-project-id="${projectId}" th:data-case-gen-status="${apiCaseGenStatus}" th:attr="data-context-path=${contextPath}">
<div class="app-layout">
    <th:block th:replace="~{layout :: sidebar(activeKey=${fromApis != null and fromApis ? 'apis' : 'projects'})}"></th:block>
    <main class="main-area">
        <div class="container">
            <!-- 从接口列表进入：工作台 > 接口列表 > 接口名 · 测试用例 -->
            <div class="breadcrumb" th:if="${fromApis != null and fromApis}">
                <a th:href="@{/}">工作台</a> &gt; <a th:href="@{/apis}">接口列表</a> &gt; <span th:text="${apiName} + ' · 测试用例'">接口 · 测试用例</span>
            </div>
            <!-- 从项目/接口管理进入：工作台 > 项目列表 > 项目名 > 接口管理 > 接口名 · 测试用例 -->
            <div class="breadcrumb" th:if="${fromApis == null or !fromApis}">
                <a th:href="@{/}">工作台</a> &gt; <a th:href="@{/projects}">项目列表</a> &gt;
                <a th:href="@{/projects/{id}(id=${projectId})}" th:text="${projectName}">项目</a> &gt;
                <a th:href="@{/projects/{pid}/apis(pid=${projectId})}">接口管理</a> &gt; <span th:text="${apiName}">接口</span> · 测试用例
            </div>
            <h1 th:text="'测试用例 · ' + ${apiName}">测试用例</h1>
            <div class="card">
            <div class="card-header">
                <div style="font-size: 13px;color:#9ca3af;">为当前接口维护测试用例，后续可用于生成自动化测试代码。无用例时可点击「AI生成用例」。</div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button id="btnGenerateCases" type="button" class="btn-primary" th:disabled="${apiCaseGenStatus == 'generating'}" th:text="${apiCaseGenStatus == 'generating' ? '生成中' : 'AI生成用例'}" onclick="generateCasesForApi()">AI生成用例</button>
                    <button class="btn-primary" onclick="toggleForm()">新建用例</button>
                </div>
            </div>

            <div id="banner" class="banner"></div>

            <div id="formBlock" class="form-block">
                <div class="form-row">
                    <input id="caseName" placeholder="用例名称" style="flex:2;">
                    <select id="caseType" style="flex:1;">
                        <option value="normal">正常</option>
                        <option value="error">异常</option>
                        <option value="boundary">边界</option>
                    </select>
                    <select id="priority" style="flex:1;">
                        <option value="1">P1</option>
                        <option value="2">P2</option>
                        <option value="3" selected>P3</option>
                        <option value="4">P4</option>
                    </select>
                </div>
                <textarea id="requestData" placeholder='请求数据（JSON），例如 {"userId":1}'></textarea>
                <textarea id="expectedResponse" placeholder='预期响应（JSON），例如 {"code":0,"msg":"ok"}'></textarea>
                <textarea id="validationRules" placeholder='校验规则（JSON），例如 {"statusCode":200,"bodyContains":["\"code\":0"]}'></textarea>
                <div class="form-row" style="justify-content:flex-end;">
                    <button type="button" class="btn-primary" onclick="submitTestCase()">保存用例</button>
                </div>
            </div>

            <div class="table-scroll-wrap" id="caseTableWrap" style="display:none;">
                <table id="caseTable" class="data-table table-ops-wide">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>优先级</th>
                    <th>状态</th>
                    <th class="col-case-status">代码状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="caseTbody"></tbody>
                </table>
            </div>
            <div class="empty" id="caseEmpty">暂无测试用例，可点击「AI生成用例」自动生成，或「新建用例」手工新增。</div>
            <div id="paginationWrap" class="pagination-wrap" style="display:none;"></div>
            </div>
        </div>
    </main>
</div>
<script>
    function getApiId() {
        return document.body.getAttribute('data-api-id');
    }
    function getProjectId() {
        return document.body.getAttribute('data-project-id');
    }
    function getContextPath() {
        return document.body.getAttribute('data-context-path') || '';
    }

    let editingId = null;

    function formatDate(v) {
        if (v == null) return '';
        if (typeof v === 'string') return v.replace('T', ' ').substring(0, 19);
        if (typeof v === 'object' && v.length >= 6) return v.slice(0, 3).join('-') + ' ' + v.slice(3, 6).join(':');
        return String(v);
    }

    function showBanner(ok, msg) {
        const el = document.getElementById('banner');
        el.classList.remove('ok', 'err');
        el.classList.add(ok ? 'ok' : 'err');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => {
            el.style.display = 'none';
        }, 3000);
    }

    function setGenerateBtnState(disabled, text) {
        const btn = document.getElementById('btnGenerateCases');
        if (btn) {
            btn.disabled = disabled;
            btn.textContent = text || (disabled ? '生成中' : 'AI生成用例');
        }
    }

    async function generateCasesForApi() {
        const projectId = getProjectId();
        const apiId = getApiId();
        if (!projectId || !apiId) {
            showBanner(false, '缺少项目或接口信息');
            return;
        }
        const btn = document.getElementById('btnGenerateCases');
        if (btn && btn.disabled) return;
        try {
            const resp = await fetch(`/api/projects/${projectId}/apis/${apiId}/generate-cases`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                showBanner(false, err.message || 'AI 生成用例失败');
                return;
            }
            const data = await resp.json();
            showBanner(true, data.message || '已开始生成，请刷新列表查看进度');
            setGenerateBtnState(true, '生成中');
            await loadTestCases(1);
        } catch (e) {
            showBanner(false, 'AI 生成用例异常，请查看控制台');
        }
    }

    const CASE_PAGE_SIZE = 10;
    let caseCurrentPage = 1;

    function renderCasePagination(total, page, totalPages) {
        const wrap = document.getElementById('paginationWrap');
        if (!wrap) return;
        if (total === 0) { wrap.style.display = 'none'; return; }
        let html = '<span class="pagination-info">共 ' + total + ' 条，第 ' + page + ' / ' + totalPages + ' 页</span>';
        if (totalPages > 1) {
            html += '<nav class="pagination">';
            if (page > 1) html += '<a href="javascript:void(0)" data-page="' + (page - 1) + '">上一页</a>';
            for (let p = 1; p <= totalPages; p++) {
                if (p === page) html += '<span class="page-current">' + p + '</span>';
                else html += '<a href="javascript:void(0)" data-page="' + p + '">' + p + '</a>';
            }
            if (page < totalPages) html += '<a href="javascript:void(0)" data-page="' + (page + 1) + '">下一页</a>';
            html += '</nav>';
        }
        wrap.innerHTML = html;
        wrap.style.display = 'flex';
        wrap.querySelectorAll('a[data-page]').forEach(a => { a.addEventListener('click', function() { caseCurrentPage = parseInt(this.getAttribute('data-page'), 10); loadTestCases(); }); });
    }

    async function loadTestCases(pageNum) {
        if (typeof pageNum === 'number' && !isNaN(pageNum) && pageNum >= 1) caseCurrentPage = pageNum;
        const apiId = getApiId();
        if (!apiId) return;
        try {
            const resp = await fetch(`/api/apis/${apiId}/testcases?page=${caseCurrentPage}&size=${CASE_PAGE_SIZE}`);
            if (!resp.ok) {
                console.error('加载测试用例失败', resp.status);
                return;
            }
            const data = await resp.json();
            const records = data.records || [];
            const total = data.total || 0;
            const totalPages = total === 0 ? 1 : Math.ceil(total / CASE_PAGE_SIZE);
            const tbody = document.getElementById('caseTbody');
            const tableWrap = document.getElementById('caseTableWrap');
            const empty = document.getElementById('caseEmpty');
            const paginationWrap = document.getElementById('paginationWrap');

            tbody.innerHTML = '';
            if (records.length === 0) {
                if (tableWrap) tableWrap.style.display = 'none';
                empty.style.display = 'block';
                if (paginationWrap) paginationWrap.style.display = 'none';
                return;
            }

            const codeStatusText = { pending: '未生成', generating: '生成中', done: '已生成', failed: '失败' };
            const getCodeStatusLabel = (s) => codeStatusText[s] || (s || '未生成');
            const ctx = getContextPath();
            records.forEach(c => {
                const tr = document.createElement('tr');
                const status = c.status || 'pending';
                const codeGen = (c.codeGenStatus != null ? c.codeGenStatus : c.code_gen_status) || 'pending';
                const canGenCode = codeGen !== 'generating';
                const genCodeBtn = canGenCode
                    ? `<button type="button" class="btn-primary" style="padding:3px 8px;font-size:11px;margin-right:4px;" onclick="generateCodeForCase(${c.id})">AI生成测试用例自动化代码</button>`
                    : `<button type="button" class="btn-primary" style="padding:3px 8px;font-size:11px;margin-right:4px;" disabled>AI生成测试用例自动化代码</button>`;
                tr.innerHTML = `
                    <td>${c.id}</td>
                    <td>${(c.caseName ?? '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>
                    <td><span class="tag">${(c.caseType ?? '').replace(/</g, '&lt;')}</span></td>
                    <td><span class="tag">P${c.priority ?? 3}</span></td>
                    <td><span class="tag">${String(status).replace(/</g, '&lt;')}</span></td>
                    <td class="col-case-status"><span class="tag">${getCodeStatusLabel(codeGen)}</span></td>
                    <td>${formatDate(c.createdAt)}</td>
                    <td>
                        ${genCodeBtn}
                        <a class="link-btn" href="${ctx}/testcases/${c.id}/code" style="margin-right:4px;">代码</a>
                        <button type="button" class="btn-primary" style="padding:3px 8px;font-size:11px;margin-right:4px;" onclick="editTestCase(${c.id})">编辑</button>
                        ${status === 'disabled' ? `<button type="button" class="btn-primary" style="padding:3px 8px;font-size:11px;margin-right:4px;background:rgba(34,197,94,0.7);" onclick="enableTestCase(${c.id})">启用</button>` : `<button type="button" class="btn-primary" style="padding:3px 8px;font-size:11px;margin-right:4px;background:rgba(239,68,68,0.6);" onclick="disableTestCase(${c.id})">禁用</button>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            if (tableWrap) tableWrap.style.display = 'block';
            empty.style.display = 'none';
            renderCasePagination(total, caseCurrentPage, totalPages);
        } catch (e) {
            console.error('加载测试用例异常', e);
        }
    }

    function collectFormData() {
        const apiId = getApiId();
        const nameInput = document.getElementById('caseName');
        const typeSelect = document.getElementById('caseType');
        const prioritySelect = document.getElementById('priority');
        const reqInput = document.getElementById('requestData');
        const respInput = document.getElementById('expectedResponse');
        const ruleInput = document.getElementById('validationRules');

        const caseName = nameInput.value.trim();
        const caseType = typeSelect.value;
        const priority = parseInt(prioritySelect.value, 10);
        const requestData = reqInput.value.trim();
        const expectedResponse = respInput.value.trim();
        const validationRules = ruleInput.value.trim();

        if (!caseName) {
            showBanner(false, '用例名称不能为空');
            return null;
        }

        const jsonFields = [
            {value: requestData, name: '请求数据'},
            {value: expectedResponse, name: '预期响应'},
            {value: validationRules, name: '校验规则'}
        ];
        for (const f of jsonFields) {
            if (!f.value) continue;
            try {
                JSON.parse(f.value);
            } catch (e) {
                showBanner(false, f.name + ' JSON 格式不正确');
                return null;
            }
        }

        return {
            apiId,
            caseName,
            caseType,
            priority,
            requestData,
            expectedResponse,
            validationRules
        };
    }

    async function submitTestCase() {
        const data = collectFormData();
        if (!data) return;
        const apiId = data.apiId;
        const method = editingId ? 'PUT' : 'POST';
        const url = editingId
            ? `/api/apis/${apiId}/testcases/${editingId}`
            : `/api/apis/${apiId}/testcases`;
        try {
            const resp = await fetch(url, {
                method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    caseName: data.caseName,
                    caseType: data.caseType,
                    priority: data.priority,
                    requestData: data.requestData,
                    expectedResponse: data.expectedResponse,
                    validationRules: data.validationRules
                })
            });
            if (!resp.ok) {
                showBanner(false, (editingId ? '更新' : '创建') + '测试用例失败，状态码：' + resp.status);
                return;
            }

            document.getElementById('caseName').value = '';
            document.getElementById('requestData').value = '';
            document.getElementById('expectedResponse').value = '';
            document.getElementById('validationRules').value = '';
            editingId = null;
            await loadTestCases();
            showBanner(true, (method === 'POST' ? '创建' : '更新') + '测试用例成功');
        } catch (e) {
            console.error('提交测试用例异常', e);
            showBanner(false, '提交测试用例异常，请查看控制台');
        }
    }

    async function editTestCase(id) {
        const apiId = getApiId();
        try {
            const resp = await fetch(`/api/apis/${apiId}/testcases/${id}`);
            if (!resp.ok) {
                showBanner(false, '加载测试用例详情失败，状态码：' + resp.status);
                return;
            }
            const c = await resp.json();
            document.getElementById('caseName').value = c.caseName || '';
            document.getElementById('caseType').value = c.caseType || 'normal';
            document.getElementById('priority').value = c.priority || 3;
            document.getElementById('requestData').value = c.requestData || '';
            document.getElementById('expectedResponse').value = c.expectedResponse || '';
            document.getElementById('validationRules').value = c.validationRules || '';
            editingId = id;
            const block = document.getElementById('formBlock');
            block.style.display = 'flex';
        } catch (e) {
            console.error('加载测试用例详情异常', e);
            showBanner(false, '加载测试用例详情异常，请查看控制台');
        }
    }

    async function disableTestCase(id) {
        const apiId = getApiId();
        try {
            const resp = await fetch(`/api/apis/${apiId}/testcases/${id}`, {
                method: 'DELETE'
            });
            if (!resp.ok) {
                showBanner(false, '禁用测试用例失败，状态码：' + resp.status);
                return;
            }
            await loadTestCases();
            showBanner(true, '测试用例已禁用');
        } catch (e) {
            console.error('禁用测试用例异常', e);
            showBanner(false, '禁用测试用例异常，请查看控制台');
        }
    }

    async function enableTestCase(id) {
        const apiId = getApiId();
        try {
            const resp = await fetch(`/api/apis/${apiId}/testcases/${id}/enable`, { method: 'PATCH' });
            if (!resp.ok) {
                showBanner(false, '启用测试用例失败，状态码：' + resp.status);
                return;
            }
            await loadTestCases();
            showBanner(true, '测试用例已启用');
        } catch (e) {
            showBanner(false, '启用测试用例异常，请查看控制台');
        }
    }

    async function generateCodeForCase(caseId) {
        const apiId = getApiId();
        try {
            const resp = await fetch(`/api/apis/${apiId}/testcodes/generate-case/${caseId}`, { method: 'POST' });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                showBanner(false, err.message || '生成测试代码失败');
                await loadTestCases(caseCurrentPage);
                return;
            }
            const data = await resp.json();
            showBanner(true, data.message || '已开始生成，请刷新列表查看进度');
            await loadTestCases(caseCurrentPage);
        } catch (e) {
            showBanner(false, '生成测试代码异常，请查看控制台');
            await loadTestCases(caseCurrentPage);
        }
    }

    function toggleForm() {
        const block = document.getElementById('formBlock');
        block.style.display = block.style.display === 'none' || block.style.display === '' ? 'flex' : 'none';
    }

    document.addEventListener('DOMContentLoaded', function() { loadTestCases(); });
</script>
</body>
</html>
